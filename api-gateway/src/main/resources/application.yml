# Spring Cloud Gateway (Server WebMVC) — prefix must match your starter: spring.cloud.gateway.server.webmvc
# Local defaults point at the ports in each service’s main application.yml
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: vehicle-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/vehicles/**
            - id: customer-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/customers/**
            - id: billing-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/invoices/**
            - id: rental-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/rentals/**

server:
  port: 8080
